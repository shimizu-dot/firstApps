<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保存データ</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f3f8ff;
      color: #173455;
      padding: 20px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #c8d9ee;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(27, 77, 145, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f7fbff;
      border: 1px solid #d2e4f8;
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
    }

    a {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      color: #fff;
      background: #2d6cdf;
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>受信データ</h1>
    <pre id="result">読み込み中...</pre>
    <a href="model.html">戻る</a>
  </main>

  <script>
    const result = document.getElementById("result");
    const params = new URLSearchParams(location.search);
    const payload = params.get("payload");

    if (!payload) {
      result.textContent = "payload が見つかりません。";
    } else {
      try {
        const data = JSON.parse(payload);
        result.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        result.textContent = `payload の解析に失敗しました: ${error.message}`;
      }
    }
  </script>
</body>
</html>
